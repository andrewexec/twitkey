version: "3.9"

services:
  twitkey:
    build: .
    container_name: twitkey
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - twitkey_data:/data
      - ./Caddyfile:/var/www/twitkey/Caddyfile:ro
    environment:
      - APP_NAME=Twitkey
      - APP_URL=http://localhost
      - APP_DEBUG=false
      - DB_DRIVER=sqlite
      - DB_PATH=/data/twitkey.db
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=twitkey
      - DB_USER=twitkey
      - DB_PASS=secret
      - ADMIN_SETUP_TOKEN=changeme123

  # Optional MySQL service. To use it, uncomment this service and set DB_DRIVER=mysql above.
  # mysql:
  #   image: mariadb:latest
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: twitkey
  #     MYSQL_USER: twitkey
  #     MYSQL_PASSWORD: secret
  #     MYSQL_ROOT_PASSWORD: rootsecret
  #   volumes:
  #     - mysql_data:/var/lib/mysql

volumes:
  twitkey_data:
  # mysql_data:
