version: "3.9"

services:
  twitkey:
    build: .
    container_name: twitkey
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - twitkey_data:/data
      - ./Caddyfile:/var/www/twitkey/Caddyfile:ro
    env_file:
      - .env

  # Optional MySQL service. To use it, uncomment this service and set DB_DRIVER=mysql above.
  # mysql:
  #   image: mariadb:latest
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: twitkey
  #     MYSQL_USER: twitkey
  #     MYSQL_PASSWORD: secret
  #     MYSQL_ROOT_PASSWORD: rootsecret
  #   volumes:
  #     - mysql_data:/var/lib/mysql

volumes:
  twitkey_data:
  # mysql_data:
